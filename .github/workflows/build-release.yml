name: Build and Release Extension

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Type check
        run: npm run type-check
        
      - name: Lint
        run: npm run lint
        continue-on-error: true
        
      - name: Build extension
        run: npm run build
        
      - name: Create ZIP archive
        run: |
          cd dist
          zip -r ../devbuddy-extension-${{ github.event.release.tag_name }}.zip .
          cd ..
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: devbuddy-extension-${{ github.event.release.tag_name }}
          path: devbuddy-extension-${{ github.event.release.tag_name }}.zip
          
      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: devbuddy-extension-${{ github.event.release.tag_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
