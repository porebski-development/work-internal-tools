name: Build and Release Extension

on:
  push:
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Type check
        run: npm run type-check
        
      - name: Lint
        run: npm run lint
        continue-on-error: true
        
      - name: Build extension
        run: npm run build
        
      - name: Create ZIP archive
        run: |
          cd dist
          zip -r ../devbuddy-extension-${{ github.ref_name }}.zip .
          cd ..
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: devbuddy-extension-${{ github.ref_name }}
          path: devbuddy-extension-${{ github.ref_name }}.zip
          
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: devbuddy-extension-${{ github.ref_name }}.zip
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Upload to Chrome Web Store (Optional)
        if: startsWith(github.ref, 'refs/tags/') && secrets.CHROME_EXTENSION_ID != ''
        run: |
          npm install -g chrome-webstore-upload-cli
          chrome-webstore-upload upload \\
            --source devbuddy-extension-${{ github.ref_name }}.zip \\
            --extension-id ${{ secrets.CHROME_EXTENSION_ID }} \\
            --client-id ${{ secrets.CHROME_CLIENT_ID }} \\
            --client-secret ${{ secrets.CHROME_CLIENT_SECRET }} \\
            --refresh-token ${{ secrets.CHROME_REFRESH_TOKEN }}
